
<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chladni</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1e1e1e; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
  // ── params ───────────────────────────────────────────────────────────────
  var P = { m:8, n:4, a:1, b:1, v:0.02, num:10000 };

  function randInt(a, b)   { return Math.floor(Math.random() * (b - a + 1)) + a; }
  function randChoice(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
  var aVals = [-2, -1, 1, 2];

  function randomise() {
    P.m = randInt(1, 16);
    P.n = randInt(1, 16);
    P.a = randChoice(aVals);
    P.b = randChoice(aVals);
  }

  // ── canvas ───────────────────────────────────────────────────────────────
  var canvas = document.getElementById('c');
  var ctx    = canvas.getContext('2d');
  var dpr    = Math.min(window.devicePixelRatio || 1, 2);

  function resize() {
    canvas.width  = window.innerWidth  * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width  = window.innerWidth  + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
  }
  resize();
  window.addEventListener('resize', resize);

  // ── Chladni ──────────────────────────────────────────────────────────────
  var PI  = Math.PI;
  var MIN = 0.002;

  function chladni(x, y) {
    return P.a * Math.sin(PI * P.n * x) * Math.sin(PI * P.m * y)
         + P.b * Math.sin(PI * P.m * x) * Math.sin(PI * P.n * y);
  }

  // ── particles ─────────────────────────────────────────────────────────────
  var NUM = 10000;
  var px  = new Float32Array(NUM);
  var py  = new Float32Array(NUM);
  for (var i = 0; i < NUM; i++) {
    px[i] = 0.05 + Math.random() * 0.9;
    py[i] = 0.05 + Math.random() * 0.9;
  }

  // ── draw loop ─────────────────────────────────────────────────────────────
  var isActive  = false;
  var lastTime  = 0;
  var FRAME_MS  = 1000 / 30; // 30 fps cap

  function draw(ts) {
    requestAnimationFrame(draw);
    if (!isActive)              return;
    if (ts - lastTime < FRAME_MS) return;
    lastTime = ts;

    var W = window.innerWidth;
    var H = window.innerHeight;

    ctx.fillStyle = 'rgb(30,30,30)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.beginPath();

    for (var i = 0; i < NUM; i++) {
      var x   = px[i], y = py[i];
      var eq  = chladni(x, y);
      var amp = P.v * Math.abs(eq);
      if (amp < MIN) amp = MIN;

      x += (Math.random() * 2 - 1) * amp;
      y += (Math.random() * 2 - 1) * amp;

      if (x < 0) x = -x;
      if (x > 1) x = 2 - x;
      if (y < 0) y = -y;
      if (y > 1) y = 2 - y;
      if (x < 0) x = 0;
      if (x > 1) x = 1;
      if (y < 0) y = 0;
      if (y > 1) y = 1;

      px[i] = x;
      py[i] = y;
      ctx.rect(x * W, y * H, 1.2, 1.2);
    }
    ctx.fill();
  }

  requestAnimationFrame(draw);

  // ── Scroll + IntersectionObserver ────────────────────────────────────────
  // This file is loaded as a sticky/fixed background inside the Webflow page.
  // It talks to the parent page via postMessage to receive scroll position,
  // OR — if SECTION-2 exists in the same document — watches it directly.

  var lastBucket = -1;

  // A) postMessage from Webflow parent (if embedded as iframe)
  window.addEventListener('message', function(e) {
    var d = e.data;
    if (!d || typeof d !== 'object') return;
    if (d.action === 'activate')   { isActive = true; }
    if (d.action === 'deactivate') { isActive = false; }
    if (d.action === 'bucket' && d.n !== lastBucket) {
      lastBucket = d.n;
      randomise();
    }
  });

  // B) Direct scroll watch — for when the file is served standalone
  //    (e.g. via GitHub Pages embedded in Webflow as an iframe pointing
  //     to the GitHub Pages URL, with the parent snippet below sending messages)
  //    OR if someone views the file directly and wants to test it.

  // For direct testing: auto-activate after 1 s so you can see it works
  // Remove these 3 lines if you don't want auto-play when viewed standalone:
  setTimeout(function() {
    if (!isActive) { isActive = true; randomise(); }
  }, 1000);

</script>

  Make sure your section has the Webflow ID "SECTION-2".

<script>
(function () {
  var iframe  = document.getElementById('YOUR_IFRAME_ID');
  var section = document.getElementById('SECTION-2');
  if (!iframe || !section) return;

  var lastBucket = -1;
  var isActive   = false;

  function post(msg) {
    try { iframe.contentWindow.postMessage(msg, '*'); } catch(e) {}
  }

  // Watch SECTION-2 entering / leaving viewport
  var io = new IntersectionObserver(function(entries) {
    var visible = entries[0].isIntersecting;
    if (visible && !isActive) {
      isActive = true;
      post({ action: 'activate' });
      if (lastBucket === -1) {
        lastBucket = 0;
        post({ action: 'bucket', n: 0 });
      }
    }
    if (!visible && isActive) {
      isActive = false;
      post({ action: 'deactivate' });
    }
  }, { threshold: 0 });
  io.observe(section);

  // Randomise at 0vh, 100vh, 200vh inside the 300vh section
  window.addEventListener('scroll', function() {
    if (!isActive) return;
    var top    = section.getBoundingClientRect().top + window.scrollY;
    var offset = window.scrollY - top;
    if (offset < 0) return;
    var bucket = Math.min(Math.floor(offset / window.innerHeight), 2);
    if (bucket !== lastBucket) {
      lastBucket = bucket;
      post({ action: 'bucket', n: bucket });
    }
  }, { passive: true });
})();
</script>

</body>
</html>
