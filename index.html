<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chladni</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1e1e1e; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
  const PI = Math.PI, MIN = 0.002, NUM = 10000;
  let P = { m: 8, n: 4, a: 1, b: 1, v: 0.02 };
  const aVals = [-2, -1, 1, 2];
  const ri = (a, b) => (Math.random() * (b - a + 1) | 0) + a;
  const rc = arr => arr[Math.random() * arr.length | 0];

  function randomise() {
    P.m = ri(1, 16); P.n = ri(1, 16);
    P.a = rc(aVals); P.b = rc(aVals);
  }

  window.addEventListener('message', e => { if (e.data === 'randomise') randomise(); });

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const dpr = Math.min(devicePixelRatio || 1, 2);

  let PW, PH;
  function resize() {
    const cssW = window.innerWidth, cssH = window.innerHeight;
    canvas.style.width  = cssW + 'px';
    canvas.style.height = cssH + 'px';
    canvas.width  = cssW * dpr;
    canvas.height = cssH * dpr;
    PW = canvas.width; PH = canvas.height;
  }
  resize();
  window.addEventListener('resize', resize);

  const xs = new Float32Array(NUM);
  const ys = new Float32Array(NUM);
  for (let i = 0; i < NUM; i++) {
    xs[i] = 0.05 + Math.random() * 0.90;
    ys[i] = 0.05 + Math.random() * 0.90;
  }

  function chladni(x, y) {
    return P.a * Math.sin(PI * P.n * x) * Math.sin(PI * P.m * y)
         + P.b * Math.sin(PI * P.m * x) * Math.sin(PI * P.n * y);
  }

  function frame() {
    const img = ctx.createImageData(PW, PH);
    const buf = new Uint32Array(img.data.buffer);
    const BG = 0xFF1E1E1E, WHITE = 0xFFFFFFFF;
    buf.fill(BG);

    const v = P.v;
    for (let i = 0; i < NUM; i++) {
      let x = xs[i], y = ys[i];
      const amp = Math.max(v * Math.abs(chladni(x, y)), MIN);
      x += (Math.random() * 2 - 1) * amp;
      y += (Math.random() * 2 - 1) * amp;
      if (x < 0) x = -x; else if (x > 1) x = 2 - x;
      if (y < 0) y = -y; else if (y > 1) y = 2 - y;
      if (x < 0) x = 0; else if (x > 1) x = 1;
      if (y < 0) y = 0; else if (y > 1) y = 1;
      xs[i] = x; ys[i] = y;
      const px = x * (PW - 1) | 0, py = y * (PH - 1) | 0;
      buf[py * PW + px] = WHITE;
    }
    ctx.putImageData(img, 0, 0);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  let lastBucket = -1;
  window.addEventListener('scroll', () => {
    const bucket = window.scrollY / window.innerHeight | 0;
    if (bucket !== lastBucket) { lastBucket = bucket; randomise(); }
  }, { passive: true });
</script>
</body>
</html>
