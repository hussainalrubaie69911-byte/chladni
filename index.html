<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chladni</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1e1e1e; }
    #c { display: block; }
  </style>
</head>
<body>
<div id="c"></div>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
<script>
  let P = { m:8, n:4, a:1, b:1, v:0.02, num:10000 };

  const randInt    = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
  const randChoice = arr    => arr[Math.floor(Math.random() * arr.length)];
  const aVals = [-2, -1, 1, 2];

  function randomise() {
    P.m = randInt(1, 16);
    P.n = randInt(1, 16);
    P.a = randChoice(aVals);
    P.b = randChoice(aVals);
  }

  // Listen for scroll messages from the Webflow parent page
  window.addEventListener('message', function(e) {
    if (e.data === 'randomise') randomise();
  });

  new p5(function(p) {
    const PI = Math.PI, MIN = 0.002;
    let pts = [], W, H;

    function chladni(x, y) {
      return P.a * Math.sin(PI*P.n*x) * Math.sin(PI*P.m*y)
           + P.b * Math.sin(PI*P.m*x) * Math.sin(PI*P.n*y);
    }

    function Pt() {
      this.x = p.random(0.05, 0.95);
      this.y = p.random(0.05, 0.95);
    }
    Pt.prototype.move = function() {
      const eq = chladni(this.x, this.y);
      let amp = P.v * Math.abs(eq);
      if (amp < MIN) amp = MIN;
      this.x += p.random(-amp, amp);
      this.y += p.random(-amp, amp);
      if (this.x < 0) this.x = -this.x;
      if (this.x > 1) this.x = 2 - this.x;
      if (this.y < 0) this.y = -this.y;
      if (this.y > 1) this.y = 2 - this.y;
      this.x = p.constrain(this.x, 0, 1);
      this.y = p.constrain(this.y, 0, 1);
    };
    Pt.prototype.show = function() { p.point(this.x*W, this.y*H); };

    p.setup = function() {
      const cnv = p.createCanvas(window.innerWidth, window.innerHeight);
      cnv.parent('c');
      p.pixelDensity(Math.min(window.devicePixelRatio, 2));
      W = p.width; H = p.height;
      for (let i = 0; i < 10000; i++) pts.push(new Pt());
    };

    p.windowResized = function() {
      p.resizeCanvas(window.innerWidth, window.innerHeight);
      W = p.width; H = p.height;
    };

    p.draw = function() {
      p.background(30);
      p.stroke(255);
      p.strokeWeight(1.2);
      const n = Math.min(P.num, pts.length);
      for (let i = 0; i < n; i++) { pts[i].move(); pts[i].show(); }
    };
  }, 'c');

  // Scroll listener — fires every 100vh
  const VH = window.innerHeight;
  let lastBucket = -1;
  window.addEventListener('scroll', () => {
    const bucket = Math.floor(window.scrollY / VH);
    if (bucket !== lastBucket) { lastBucket = bucket; randomise(); }
  }, { passive: true });
</script>
</body>
</html>
